name: Bug report
description: Report a reproducible bug in nviron
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please provide enough context for us to reproduce it quickly."

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the issue
      placeholder: |
        1. Install ...
        2. Configure ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details
      placeholder: |
        - nviron version:
        - Node.js version:
        - Package manager:
        - Framework (if any):
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, stack traces, or links
